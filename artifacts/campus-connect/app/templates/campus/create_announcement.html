{% extends "base.html" %}
{% block title %}Create Announcement{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <a href="/" class="text-primary-600 hover:underline text-sm mb-4 block">← Back to Feed</a>
    <div class="card">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Post Announcement</h1>
        {% if not current_user.is_teacher() %}
        <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-5 text-blue-700 text-sm">
            Announcements from students require teacher approval.
        </div>
        {% endif %}
        <form method="POST" action="/announcements/create" class="space-y-5">
            <div>
                <label class="form-label">Title *</label>
                <input type="text" name="title" required placeholder="Announcement title..." class="input-field">
            </div>
            <div>
                <label class="form-label">Content *</label>
                <textarea name="content" rows="5" required placeholder="Write your announcement..." class="input-field"></textarea>
            </div>
            <div>
                <label class="form-label">Priority</label>
                <select name="priority" class="input-field">
                    <option value="normal">Normal</option>
                    <option value="important">Important</option>
                    <option value="urgent">Urgent</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="btn-primary">Post Announcement</button>
                <a href="/" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
