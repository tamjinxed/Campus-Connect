{% extends "base.html" %}
{% block title %}Create Announcement{% endblock %}
{% block page_title %}Announcement{% endblock %}
{% block pt %}Post Announcement{% endblock %}
{% block header_actions %}<a href="/" class="btn btn-secondary btn-sm">← Feed</a>{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="card">
        <h2 class="font-bold text-slate-800 text-lg mb-5">Post Announcement</h2>
        <form method="POST" action="/announcements/create" class="space-y-4">
            <div>
                <label class="form-label">Title *</label>
                <input type="text" name="title" required class="input-field">
            </div>
            <div>
                <label class="form-label">Content *</label>
                <textarea name="content" rows="5" required class="input-field"></textarea>
            </div>
            <div>
                <label class="form-label">Priority</label>
                <select name="priority" class="input-field">
                    <option value="normal">Normal</option>
                    <option value="important">Important</option>
                    <option value="urgent">Urgent</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="btn btn-primary">Post</button>
                <a href="/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
