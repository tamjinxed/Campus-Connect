{% extends "base.html" %}
{% block title %}Create Classroom{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
    <a href="/classroom/" class="text-primary-600 hover:underline text-sm mb-4 block">← Back to Classrooms</a>
    <div class="card">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Create Classroom</h1>
        <form method="POST" action="/classroom/create" class="space-y-5">
            <div>
                <label class="form-label">Class Name *</label>
                <input type="text" name="name" required placeholder="e.g. CSE400 - Software Development" class="input-field">
            </div>
            <div>
                <label class="form-label">Description</label>
                <textarea name="description" rows="3" placeholder="Brief description of the class..." class="input-field"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="form-label">Department</label>
                    <select name="department" class="input-field">
                        <option value="">Select...</option>
                        {% for dept in ['CSE','EEE','BBA','English','Mathematics','Physics'] %}
                        <option value="{{ dept }}">{{ dept }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="form-label">Section</label>
                    <input type="text" name="section" placeholder="e.g. A, B, C" class="input-field">
                </div>
            </div>
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-blue-700 text-sm">
                A unique class code will be generated automatically for students to join.
            </div>
            <div class="flex gap-3">
                <button type="submit" class="btn-primary">Create Classroom</button>
                <a href="/classroom/" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
